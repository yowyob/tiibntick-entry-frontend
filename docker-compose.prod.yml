services:
  tnt-entry-front:
    image: "${APP_IMAGE:?APP_IMAGE requis}"
    container_name: tnt-entry-front
    pull_policy: always
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/ >/dev/null 2>&1 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 15
      start_period: 40s
    logging: { driver: "json-file", options: { max-size: "50m", max-file: "5" } }
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.tnt-entry.rule=Host(`tiibntick.yowyob.com`)"
      - "traefik.http.routers.tnt-entry.entrypoints=websecure"
      - "traefik.http.routers.tnt-entry.tls=true"
      - "traefik.http.routers.tnt-entry.tls.certresolver=letsencrypt"
      - "traefik.http.routers.tnt-entry.priority=10"
      - "traefik.http.services.tnt-entry.loadbalancer.server.port=3000"
      - "traefik.docker.network=yowyob"
    networks: [yowyob]
networks:
  yowyob: { external: true, name: yowyob }
